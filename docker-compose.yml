services:
  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      CLIENT_URL: http://localhost
    volumes:
      # Persist task and user data outside the container
      - todo-data:/app/data
    expose:
      - "5000"

  client:
    build:
      context: ./client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  todo-data:
