services:
  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      CLIENT_URL: http://localhost
      MONGODB_URI: ${MONGODB_URI}
    expose:
      - "5000"

  client:
    build:
      context: ./client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
